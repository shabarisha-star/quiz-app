# ========================
# SERVER CONFIG
# ========================
server.port=8080
server.servlet.context-path=/api

# ========================
# APPLICATION
# ========================
spring.application.name=quizapp

# ========================
# DATABASE CONFIG (FIXED)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Shabareesh123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ========================
# JWT CONFIG
# ========================
jwt.secret=your-secret-key
jwt.expiration=86400000

# ========================
# LOGGING
# ========================
logging.level.org.springframework=INFO
logging.level.com.quizapp.quizapp=DEBUG

# ========================
# CORS (FIXED FOR YOUR PORT)
# ========================
cors.allowed-origins=http://localhost:5173,http://localhost:5174
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Content-Type,Authorization
cors.allow-credentials=true

# ========================
# JACKSON
# ========================
spring.jackson.time-zone=UTC

# ========================
# CONNECTION POOL (OPTIONAL)
# ========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000