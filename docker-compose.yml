version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: quizapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quizdb
      MYSQL_USER: quizuser
      MYSQL_PASSWORD: quizpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - quizapp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Backend/quizapp/Dockerfile
    container_name: quizapp-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/quizdb
      DB_USERNAME: quizuser
      DB_PASSWORD: quizpass
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - quizapp-network
    volumes:
      - ./Backend/quizapp/logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: quiz-frontend/Dockerfile
    container_name: quizapp-frontend
    environment:
      VITE_API_BASE_URL: http://backend:8080/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - quizapp-network

volumes:
  mysql_data:

networks:
  quizapp-network:
    driver: bridge
