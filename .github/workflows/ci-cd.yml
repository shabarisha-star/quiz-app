name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quizdb
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('Backend/quizapp/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Build backend
      run: |
        cd Backend/quizapp
        ./mvnw clean install
    
    - name: Run backend tests
      run: |
        cd Backend/quizapp
        ./mvnw test

  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('quiz-frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install frontend dependencies
      run: |
        cd quiz-frontend
        npm ci
    
    - name: Run ESLint
      run: |
        cd quiz-frontend
        npm run lint --if-present
    
    - name: Build frontend
      run: |
        cd quiz-frontend
        npm run build

  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: |
        docker build -t quizapp-backend:latest ./Backend/quizapp
        docker build -t quizapp-frontend:latest ./quiz-frontend
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push Docker images
      run: |
        docker tag quizapp-backend:latest ${{ secrets.DOCKER_USERNAME }}/quizapp-backend:latest
        docker tag quizapp-frontend:latest ${{ secrets.DOCKER_USERNAME }}/quizapp-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/quizapp-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/quizapp-frontend:latest
